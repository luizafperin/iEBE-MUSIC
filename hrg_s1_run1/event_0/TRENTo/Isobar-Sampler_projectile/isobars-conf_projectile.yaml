isobar_samples:
  description: "Options for the isobar nucleon\u2011position samples"
  number_configs:
    description: Number of configurations to be sampled.
    value: 1
  number_nucleons:
    description: Mass number A of the nuclei.
    value: 197
  seeds_file:
    description: Input file with list of seeds for nucleon positions.
    filename: nucleon-seeds.hdf
  output_path:
    description: Output directory where to save
    dirname: nuclei_projectile
  number_of_parallel_processes:
    description: Number of processes to compute in parallel. A value of -1 automatically
      selects the number of CPUs present.
    value: -1
  start_configuration:
    description: Starting configuration index in the seeds file
    value: 1
isobar_properties:
  description: Nuclear properties of isobars to be sampled. Entries = isobar1, isobar2,
    ... Results are saved to isobar_name.hdf
  isobar1:
    isobar_name: Au
    WS_radius:
      description: "Woods\u2011Saxon radius parameter R"
      value: 6.38
    WS_diffusiveness:
      description: "Woods\u2011Saxon diffusiveness parameter a"
      value: 0.535
    beta_2:
      description: "Quadrupolar deformation \u03B2\u2082"
      value: 0
    gamma:
      description: Quadrupolar deformation angle (rad)
      value: 0
    beta_3:
      description: "Octupolar deformation \u03B2\u2083"
      value: 0
    correlation_length:
      description: "Radius of step\u2011function correlation C(r) (fm)"
      value: 0.4
    correlation_strength:
      description: "Depth of correlation (\u2265\_\u22121)"
      value: -1
